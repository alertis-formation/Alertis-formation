name: Veille réglementaire hebdomadaire

on:
  schedule:
    - cron: '0 6 * * 1'  # Lundi 6h UTC → 7h Paris (hiver) / 8h Paris (été). GH Actions ajoute typiquement 1-3h de délai.
  workflow_dispatch:      # Bouton "Run workflow" manuel

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: weekly-veille
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Alertis Article Bot"
          git config user.email "info@alertis.fr"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--dangerously-skip-permissions --max-turns 90'
          prompt: |
            Lis le fichier `.github/prompts/weekly-veille.md` et exécute
            toutes les étapes qui y sont décrites. C'est ta seule
            consigne. Va.
